<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Plans</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown/dist/turndown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm/dist/turndown-plugin-gfm.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { color-scheme: light only; }
html, body { height: 100%; font-family: 'Lexend', sans-serif; font-weight: 300; background: #ffffff; color: #1a1a1a; }

#app { display: flex; height: 100vh; }

/* sidebar */
#sidebar {
  width: 280px; min-width: 280px;
  background: #f5f5f7; border-right: 1px solid #e0e0e0;
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-header {
  padding: 12px 16px; border-bottom: 1px solid #e0e0e0;
  font-size: 14px; font-weight: 500; color: #666;
  display: flex; align-items: center; justify-content: space-between;
}
#search {
  margin: 8px 12px; padding: 6px 10px;
  background: #fff; border: 1px solid #d0d0d0; border-radius: 4px;
  color: #1a1a1a; font-family: 'Lexend', sans-serif; font-size: 13px; outline: none;
}
#search:focus { border-color: #4a7cff; }

/* toolbar shown during multiselect */
#toolbar {
  display: none; padding: 6px 12px;
  background: #eef0f5; border-bottom: 1px solid #e0e0e0;
  align-items: center; gap: 8px; font-size: 12px;
}
#toolbar.visible { display: flex; }
#toolbar button {
  background: #e53e3e; color: #fff; border: none; border-radius: 4px;
  padding: 4px 10px; font-family: 'Lexend', sans-serif; font-size: 12px; cursor: pointer;
}
#toolbar button:hover { background: #c53030; }
#toolbar .cancel-btn { background: #a0a0a0; }
#toolbar .cancel-btn:hover { background: #888; }

#plan-list { flex: 1; overflow-y: auto; padding: 4px 0; }

.plan-item {
  padding: 8px 16px; cursor: pointer; border-left: 3px solid transparent;
  transition: background 0.1s; display: flex; align-items: center; gap: 8px;
}
.plan-item:hover { background: #eaeaee; }
.plan-item.active { background: #e4e8f0; border-left-color: #4a7cff; }
.plan-item.selected { background: #dde3f0; }
.plan-item .checkbox {
  display: none; width: 14px; height: 14px; accent-color: #4a7cff; flex-shrink: 0;
}
.multiselect-mode .plan-item .checkbox { display: inline-block; }
.plan-info { flex: 1; min-width: 0; }
.plan-name { font-size: 13px; font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #1a1a1a; }
.plan-date { font-size: 11px; color: #999; margin-top: 2px; }
.star-btn {
  background: none; border: none; cursor: pointer; padding: 0; font-size: 14px;
  color: #ccc; flex-shrink: 0; line-height: 1; transition: color 0.15s;
}
.star-btn:hover { color: #f5a623; }
.star-btn.active { color: #f5a623; }

/* content pane */
#content-wrap {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
#content-header {
  display: none; padding: 12px 24px; border-bottom: 1px solid #e0e0e0;
  align-items: center; gap: 8px; flex-shrink: 0;
}
#content-header.visible { display: flex; }
#content-title {
  flex: 1; font-size: 14px; font-weight: 500; color: #333;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-btn {
  background: #eef0f5; color: #333; border: 1px solid #d0d0d0; border-radius: 4px;
  padding: 5px 12px; font-family: 'Lexend', sans-serif; font-size: 12px; cursor: pointer;
}
.header-btn:hover { background: #e0e3ea; }
.header-btn.danger { color: #e53e3e; border-color: #e5a0a0; }
.header-btn.danger:hover { background: #fef0f0; }
.header-btn.primary { background: #4a7cff; color: #fff; border-color: #4a7cff; }
.header-btn.primary:hover { background: #3a6ce8; }

#content {
  flex: 1; overflow-y: auto; padding: 32px 48px;
}
#content.empty {
  display: flex; align-items: center; justify-content: center;
  color: #aaa; font-size: 14px;
}

/* edit mode — WYSIWYG */
#content.editing {
  outline: 2px solid #4a7cff; outline-offset: -2px; border-radius: 4px;
  min-height: 200px;
}
#edit-toolbar {
  display: none; padding: 4px 16px; border-bottom: 1px solid #e0e0e0;
  background: #f9f9fb; align-items: center; gap: 2px; flex-shrink: 0;
}
#edit-toolbar.visible { display: flex; }
#edit-toolbar button {
  background: none; border: 1px solid transparent; border-radius: 4px;
  padding: 4px 8px; font-size: 13px; cursor: pointer; color: #444;
  font-family: 'SF Mono', 'Fira Code', monospace; line-height: 1;
}
#edit-toolbar button:hover { background: #eef0f5; border-color: #d0d0d0; }
#edit-toolbar .sep { width: 1px; height: 18px; background: #d0d0d0; margin: 0 4px; }
/* locked blocks in edit mode — visual hint they're read-only */
#content.editing .locked-block { opacity: 0.7; cursor: not-allowed; position: relative; }
#content.editing .locked-block::after {
  content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(
    -45deg, transparent, transparent 8px, rgba(0,0,0,0.02) 8px, rgba(0,0,0,0.02) 16px
  );
}

/* markdown styles */
#content h1 { font-size: 24px; margin: 0 0 16px; color: #111; font-weight: 500; }
#content h2 { font-size: 18px; margin: 24px 0 12px; color: #222; border-bottom: 1px solid #e0e0e0; padding-bottom: 6px; font-weight: 400; }
#content h3 { font-size: 15px; margin: 20px 0 8px; color: #333; font-weight: 400; }
#content p { margin: 8px 0; line-height: 1.6; font-size: 14px; color: #2a2a2a; }
#content ul, #content ol { margin: 8px 0 8px 24px; font-size: 14px; line-height: 1.6; color: #2a2a2a; }
#content code { background: #f0f0f4; padding: 2px 6px; border-radius: 3px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; color: #c7254e; }
#content pre { background: #f6f6f9; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 12px 0; border: 1px solid #e8e8ec; }
#content pre code { background: none; padding: 0; color: #2a2a2a; }
#content blockquote { border-left: 3px solid #d0d0d0; padding-left: 16px; color: #666; margin: 12px 0; }
#content a { color: #4a7cff; }
#content table { border-collapse: collapse; margin: 12px 0; font-size: 14px; }
#content th, #content td { border: 1px solid #e0e0e0; padding: 6px 12px; }
#content th { background: #f5f5f7; font-weight: 400; }
#content hr { border: none; border-top: 1px solid #e0e0e0; margin: 20px 0; }
#content input[type="checkbox"] { margin-right: 6px; }

/* confirm dialog */
.dialog-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  align-items: center; justify-content: center; z-index: 100;
}
.dialog-overlay.visible { display: flex; }
.dialog {
  background: #fff; border: 1px solid #d0d0d0; border-radius: 8px;
  padding: 24px; max-width: 400px; width: 90%; box-shadow: 0 8px 30px rgba(0,0,0,0.12);
}
.dialog p { margin-bottom: 16px; font-size: 14px; }
.dialog-buttons { display: flex; gap: 8px; justify-content: flex-end; }

/* rename input */
#rename-input {
  background: #fff; border: 1px solid #4a7cff; border-radius: 4px;
  color: #1a1a1a; font-family: 'Lexend', sans-serif; padding: 4px 8px; font-size: 13px; outline: none;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #aaa; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Claude Plans</span>
      <span id="count"></span>
    </div>
    <input id="search" type="text" placeholder="filter plans...">
    <div id="toolbar">
      <span id="sel-count">0 selected</span>
      <button id="del-selected" class="">delete</button>
      <button class="cancel-btn" id="cancel-select">cancel</button>
    </div>
    <div id="plan-list"></div>
  </div>
  <div id="content-wrap">
    <div id="content-header">
      <span id="content-title"></span>
      <button class="star-btn" id="btn-star" style="font-size:18px" title="Toggle favorite">&#9734;</button>
      <button class="header-btn" id="btn-rename">rename</button>
      <button class="header-btn" id="btn-edit">edit</button>
      <button class="header-btn" id="btn-save" style="display:none">save</button>
      <button class="header-btn" id="btn-cancel-edit" style="display:none">cancel</button>
      <button class="header-btn" id="btn-select">select</button>
      <button class="header-btn danger" id="btn-delete">delete</button>
    </div>
    <div id="edit-toolbar">
      <button data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button data-cmd="code" title="Inline code">{ }</button>
      <span class="sep"></span>
      <button data-cmd="h1" title="Heading 1">H1</button>
      <button data-cmd="h2" title="Heading 2">H2</button>
      <button data-cmd="h3" title="Heading 3">H3</button>
      <span class="sep"></span>
      <button data-cmd="ul" title="Bullet list">&bull; list</button>
      <button data-cmd="ol" title="Numbered list">1. list</button>
      <span class="sep"></span>
      <button data-cmd="link" title="Insert link">link</button>
    </div>
    <div id="content" class="empty">select a plan</div>
  </div>
</div>

<!-- confirm dialog -->
<div class="dialog-overlay" id="confirm-dialog">
  <div class="dialog">
    <p id="confirm-msg"></p>
    <div class="dialog-buttons">
      <button class="header-btn" id="confirm-no">cancel</button>
      <button class="header-btn danger" id="confirm-yes">delete</button>
    </div>
  </div>
</div>

<script>
let plans = [];
let activeFile = null;
let activeContent = '';  // raw markdown of active plan
let editing = false;
let multiselect = false;
let selected = new Set();
let confirmResolve = null;

// -- data --

async function loadPlans() {
  const res = await fetch('/api/plans');
  plans = await res.json();
  document.getElementById('count').textContent = plans.length;
  renderList(document.getElementById('search').value);
}

async function loadPlan(filename) {
  exitEdit();
  activeFile = filename;
  renderList(document.getElementById('search').value);
  const header = document.getElementById('content-header');
  header.className = 'visible';
  document.getElementById('content-title').textContent = filename.replace(/\.md$/, '');
  const content = document.getElementById('content');
  content.className = '';
  const res = await fetch('/api/plans/' + encodeURIComponent(filename));
  activeContent = await res.text();
  content.innerHTML = marked.parse(activeContent);
  updateStarButton();
}

async function deletePlan(filename) {
  await fetch('/api/plans/' + encodeURIComponent(filename), { method: 'DELETE' });
  if (activeFile === filename) {
    activeFile = null;
    activeContent = '';
    document.getElementById('content').className = 'empty';
    document.getElementById('content').innerHTML = 'select a plan';
    document.getElementById('content-header').className = '';
  }
  await loadPlans();
}

async function deleteBatch(files) {
  await fetch('/api/plans/delete-batch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: Array.from(files) }),
  });
  if (files.has(activeFile)) {
    activeFile = null;
    activeContent = '';
    document.getElementById('content').className = 'empty';
    document.getElementById('content').innerHTML = 'select a plan';
    document.getElementById('content-header').className = '';
  }
  exitMultiselect();
  await loadPlans();
}

async function renamePlan(oldName, newName) {
  const res = await fetch('/api/plans/' + encodeURIComponent(oldName) + '/rename', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: newName }),
  });
  if (!res.ok) return false;
  const data = await res.json();
  if (activeFile === oldName) activeFile = data.name;
  await loadPlans();
  if (activeFile) loadPlan(activeFile);
  return true;
}

async function savePlan(filename, content) {
  await fetch('/api/plans/' + encodeURIComponent(filename), {
    method: 'PUT',
    headers: { 'Content-Type': 'text/plain' },
    body: content,
  });
  activeContent = content;
  await loadPlans();
}

async function toggleFavorite(filename) {
  const res = await fetch('/api/favorites/' + encodeURIComponent(filename), { method: 'POST' });
  const data = await res.json();
  // update local state
  const plan = plans.find(p => p.name === filename);
  if (plan) plan.favorited = data.favorited;
  // re-sort: favorites first, then by modified desc
  plans.sort((a, b) => (a.favorited === b.favorited) ? b.modified - a.modified : a.favorited ? -1 : 1);
  renderList(document.getElementById('search').value);
  updateStarButton();
}

function updateStarButton() {
  const btn = document.getElementById('btn-star');
  if (!activeFile) return;
  const plan = plans.find(p => p.name === activeFile);
  const fav = plan && plan.favorited;
  btn.innerHTML = fav ? '&#9733;' : '&#9734;';
  btn.classList.toggle('active', !!fav);
}

// -- rendering --

function renderList(filter) {
  const list = document.getElementById('plan-list');
  const lf = filter.toLowerCase();
  const filtered = plans.filter(p => p.name.toLowerCase().includes(lf));
  list.innerHTML = filtered.map(p => {
    const name = p.name.replace(/\.md$/, '');
    const date = new Date(p.modified * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const active = p.name === activeFile ? ' active' : '';
    const sel = selected.has(p.name) ? ' selected' : '';
    const checked = selected.has(p.name) ? 'checked' : '';
    const starCls = p.favorited ? ' active' : '';
    return `<div class="plan-item${active}${sel}" data-file="${esc(p.name)}">
      <input type="checkbox" class="checkbox" ${checked}>
      <div class="plan-info">
        <div class="plan-name" title="${esc(name)}">${esc(name)}</div>
        <div class="plan-date">${date}</div>
      </div>
      <button class="star-btn${starCls}" data-star="${esc(p.name)}">${p.favorited ? '&#9733;' : '&#9734;'}</button>
    </div>`;
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// -- turndown setup --

const turndownService = new TurndownService({
  headingStyle: 'atx', codeBlockStyle: 'fenced',
  bulletListMarker: '-', emDelimiter: '*',
});
turndownService.use(turndownPluginGfm.gfm);

// -- edit mode --

function enterEdit() {
  editing = true;
  const content = document.getElementById('content');
  const scrollY = content.scrollTop;
  content.contentEditable = 'true';
  content.classList.add('editing');
  // lock code blocks — contenteditable mangles their structure
  content.querySelectorAll('pre').forEach(el => {
    el.contentEditable = 'false';
    el.classList.add('locked-block');
  });
  document.getElementById('edit-toolbar').classList.add('visible');
  document.getElementById('btn-edit').style.display = 'none';
  document.getElementById('btn-rename').style.display = 'none';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('btn-select').style.display = 'none';
  document.getElementById('btn-star').style.display = 'none';
  document.getElementById('btn-save').style.display = '';
  document.getElementById('btn-cancel-edit').style.display = '';
  content.focus();
  content.scrollTop = scrollY;
}

function exitEdit() {
  editing = false;
  const content = document.getElementById('content');
  content.contentEditable = 'false';
  content.classList.remove('editing');
  document.getElementById('edit-toolbar').classList.remove('visible');
  document.getElementById('btn-edit').style.display = '';
  document.getElementById('btn-rename').style.display = '';
  document.getElementById('btn-delete').style.display = '';
  document.getElementById('btn-select').style.display = '';
  document.getElementById('btn-star').style.display = '';
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('btn-cancel-edit').style.display = 'none';
}

// -- multiselect --

function enterMultiselect() {
  multiselect = true;
  selected.clear();
  document.getElementById('sidebar').classList.add('multiselect-mode');
  document.getElementById('toolbar').classList.add('visible');
  updateSelCount();
  renderList(document.getElementById('search').value);
}

function exitMultiselect() {
  multiselect = false;
  selected.clear();
  document.getElementById('sidebar').classList.remove('multiselect-mode');
  document.getElementById('toolbar').classList.remove('visible');
  renderList(document.getElementById('search').value);
}

function toggleSelection(name) {
  if (selected.has(name)) selected.delete(name); else selected.add(name);
  updateSelCount();
  renderList(document.getElementById('search').value);
}

function updateSelCount() {
  document.getElementById('sel-count').textContent = selected.size + ' selected';
}

// -- confirm dialog --

function confirm(msg) {
  return new Promise(resolve => {
    document.getElementById('confirm-msg').textContent = msg;
    document.getElementById('confirm-dialog').classList.add('visible');
    confirmResolve = resolve;
  });
}

document.getElementById('confirm-yes').onclick = () => {
  document.getElementById('confirm-dialog').classList.remove('visible');
  if (confirmResolve) confirmResolve(true);
};
document.getElementById('confirm-no').onclick = () => {
  document.getElementById('confirm-dialog').classList.remove('visible');
  if (confirmResolve) confirmResolve(false);
};

// -- events --

document.getElementById('plan-list').addEventListener('click', e => {
  // star click
  const starBtn = e.target.closest('.star-btn');
  if (starBtn) {
    e.stopPropagation();
    toggleFavorite(starBtn.dataset.star);
    return;
  }
  const item = e.target.closest('.plan-item');
  if (!item) return;
  const file = item.dataset.file;
  if (multiselect) {
    toggleSelection(file);
  } else {
    loadPlan(file);
  }
});

document.getElementById('btn-star').onclick = () => {
  if (activeFile) toggleFavorite(activeFile);
};

document.getElementById('search').addEventListener('input', e => renderList(e.target.value));
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Escape') { e.target.value = ''; renderList(''); }
});

// header buttons
document.getElementById('btn-edit').onclick = () => { if (activeFile) enterEdit(); };
document.getElementById('btn-save').onclick = async () => {
  if (!activeFile) return;
  const html = document.getElementById('content').innerHTML;
  const md = turndownService.turndown(html);
  await savePlan(activeFile, md);
  exitEdit();
  // re-render from saved markdown for consistency
  document.getElementById('content').innerHTML = marked.parse(activeContent);
};
document.getElementById('btn-cancel-edit').onclick = () => {
  exitEdit();
  if (activeContent) {
    document.getElementById('content').innerHTML = marked.parse(activeContent);
  }
};

document.getElementById('btn-delete').onclick = async () => {
  if (!activeFile) return;
  const ok = await confirm('Delete "' + activeFile.replace(/\.md$/, '') + '"?');
  if (ok) deletePlan(activeFile);
};

document.getElementById('btn-select').onclick = () => enterMultiselect();
document.getElementById('cancel-select').onclick = () => exitMultiselect();
document.getElementById('del-selected').onclick = async () => {
  if (selected.size === 0) return;
  const ok = await confirm('Delete ' + selected.size + ' plan(s)?');
  if (ok) deleteBatch(selected);
};

document.getElementById('btn-rename').onclick = () => {
  if (!activeFile) return;
  const titleEl = document.getElementById('content-title');
  const current = activeFile.replace(/\.md$/, '');
  titleEl.innerHTML = `<input id="rename-input" value="${esc(current)}">`;
  const input = document.getElementById('rename-input');
  input.focus();
  input.select();

  const finish = async () => {
    const newName = input.value.trim();
    if (newName && newName !== current) {
      await renamePlan(activeFile, newName);
    } else {
      titleEl.textContent = current;
    }
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') { titleEl.textContent = current; }
  });
  input.addEventListener('blur', finish);
};

// keyboard: ctrl+s to save in edit mode
document.addEventListener('keydown', e => {
  if (editing && (e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    document.getElementById('btn-save').click();
  }
});

// toolbar commands
document.getElementById('edit-toolbar').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const cmd = btn.dataset.cmd;
  if (!cmd) return;
  e.preventDefault();
  if (cmd === 'bold') document.execCommand('bold');
  else if (cmd === 'italic') document.execCommand('italic');
  else if (cmd === 'code') {
    const sel = window.getSelection();
    if (sel.rangeCount) {
      const range = sel.getRangeAt(0);
      const code = document.createElement('code');
      range.surroundContents(code);
    }
  }
  else if (cmd === 'h1') document.execCommand('formatBlock', false, 'h1');
  else if (cmd === 'h2') document.execCommand('formatBlock', false, 'h2');
  else if (cmd === 'h3') document.execCommand('formatBlock', false, 'h3');
  else if (cmd === 'ul') document.execCommand('insertUnorderedList');
  else if (cmd === 'ol') document.execCommand('insertOrderedList');
  else if (cmd === 'link') {
    const url = prompt('URL:');
    if (url) document.execCommand('createLink', false, url);
  }
  document.getElementById('content').focus();
});

// paste as plain text to avoid injecting unwanted HTML
document.getElementById('content').addEventListener('paste', e => {
  if (!editing) return;
  e.preventDefault();
  const text = e.clipboardData.getData('text/plain');
  document.execCommand('insertText', false, text);
});

// pwa
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

loadPlans();
</script>
</body>
</html>
